{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">{{ title }}</div>
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div class="col-md-6">
                <label class="form-label" for="{{ form.brand.id_for_label }}">Марка</label>
                {{ form.brand }}
                <div class="text-danger small">{{ form.brand.errors }}</div>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="{{ form.number.id_for_label }}">Номер</label>
                {{ form.number }}
                <div class="text-danger small">{{ form.number.errors }}</div>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="{{ form.capacity.id_for_label }}">Грузоподъемность</label>
                {{ form.capacity }}
                <div class="text-danger small">{{ form.capacity.errors }}</div>
            </div>
            <div class="col-md-6 d-flex align-items-end">
                <div class="form-check">
                    {{ form.is_active }}
                    <label class="form-check-label" for="{{ form.is_active.id_for_label }}">Активен</label>
                </div>
            </div>
            <div class="col-12 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="{% url 'registry:forklift_list' %}{% if forklift %}?selected={{ forklift.pk }}{% endif %}"
                   class="btn btn-outline-secondary"
                   onclick="return confirm('Не сохранять внесенные изменения? Вы уверены?')">Отменить</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
